server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Long cache for hashed Vite assets — they have content hashes in filenames
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Don't cache index.html — it's how new bundles get picked up
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    expires 0;
  }

  # SPA fallback: any unknown path returns index.html so client-side routing
  # works (e.g. links saved as /library/<note>)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Gzip text-ish responses
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;
}
